name: SentinelAI CI/CD

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  backend-tests:
    name: Backend Unit, API, AI, and Integration Tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: sentinelai_admin
          MONGO_INITDB_ROOT_PASSWORD: sentinelai_ci_password
          MONGO_INITDB_DATABASE: sentinelai_test
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet -u sentinelai_admin -p sentinelai_ci_password --authenticationDatabase admin --eval 'db.adminCommand(\"ping\").ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      DJANGO_SECRET_KEY: sentinelai-ci-secret-with-at-least-thirty-two-bytes
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: testserver,localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      MONGODB_URI: mongodb://sentinelai_admin:sentinelai_ci_password@localhost:27017/sentinelai_test?authSource=admin
      MONGODB_NAME: sentinelai_test
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CELERY_TASK_ALWAYS_EAGER: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run Django migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run backend test suite with coverage
        run: pytest

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            coverage/backend-coverage.xml
            coverage/backend-html

  frontend-tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/frontend

  docker-build:
    name: Docker Compose Build Check
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Compose environment
        run: cp .env.example .env

      - name: Validate Compose configuration
        run: docker compose --env-file .env config

      - name: Build production images
        run: docker compose --env-file .env build backend frontend celery_worker

  deployment-gate:
    name: Deployment Gate
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Deployment placeholder
        run: |
          echo "SentinelAI images passed CI build checks."
          echo "Attach registry push and production deploy commands here when infrastructure targets are provisioned."
